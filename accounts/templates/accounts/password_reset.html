{% extends "auth_base.html" %}
{% block title %}Reset password{% endblock %}
{% block auth_content %}
  <h1>Reset your password</h1>
  <p class="subtitle">Enter your email and we'll send you a link to reset it.</p>
  <form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-4">
      <label for="id_email" class="form-label">Email address</label>
      <input type="email" name="email" id="id_email" class="form-control form-control-lg" placeholder="you@example.com" required autofocus>
    </div>
    <button type="submit" class="btn btn-tf-primary w-100 py-2">
      <i class="fa-solid fa-paper-plane me-2"></i>Send Reset Link
    </button>
  </form>
  <div class="auth-footer-link">
    Remembered your password? <a href="{% url 'accounts:login' %}">Sign in</a>
  </div>
{% endblock %}
