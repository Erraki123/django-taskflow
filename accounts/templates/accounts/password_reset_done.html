{% extends "auth_base.html" %}
{% block title %}Check your email{% endblock %}
{% block auth_content %}
  <div class="text-center">
    <div class="empty-icon mx-auto mb-3" style="width:72px;height:72px;">
      <i class="fa-solid fa-envelope-circle-check"></i>
    </div>
    <h1>Check your inbox</h1>
    <p class="subtitle">We've emailed you instructions for setting a new password, if an account exists with the email you entered.</p>
  </div>
  <div class="auth-footer-link">
    <a href="{% url 'accounts:login' %}">Back to sign in</a>
  </div>
{% endblock %}
