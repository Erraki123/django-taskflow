{% extends "auth_base.html" %}
{% block title %}Password updated{% endblock %}
{% block auth_content %}
  <div class="text-center">
    <div class="empty-icon mx-auto mb-3" style="width:72px;height:72px; background:var(--tf-success-soft); color:var(--tf-success);">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <h1>Password updated</h1>
    <p class="subtitle">Your password has been changed successfully. You can now sign in.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-tf-primary w-100 py-2">Sign In</a>
  </div>
{% endblock %}
