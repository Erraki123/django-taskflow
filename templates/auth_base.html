{% load static %}<!DOCTYPE html>
<html lang="en" data-theme="{{ current_theme }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sign in{% endblock %} — {{ SITE_NAME }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%236C5DD3%22/><path d=%22M30 52l14 14 28-32%22 stroke=%22white%22 stroke-width=%229%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>">
</head>
<body>
  <div class="auth-shell">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-mark" style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg, var(--tf-primary), var(--tf-primary-light));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;">
          <i class="fa-solid fa-check"></i>
        </div>
        <span class="display-font" style="font-size:1.4rem; font-weight:800;">{{ SITE_NAME }}</span>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="tf-card mb-3" style="padding: 12px 16px; border-left: 4px solid {% if message.tags == 'success' %}var(--tf-success){% elif message.tags == 'error' %}var(--tf-danger){% else %}var(--tf-info){% endif %};">
            <small>{{ message }}</small>
          </div>
        {% endfor %}
      {% endif %}

      {% block auth_content %}{% endblock %}
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/theme.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
